<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { background-color: #4F46E5 !important; color: white !important; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-[#1E293B]">

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-2xl shadow-sm border border-gray-200 w-full max-w-[450px]">
            <div class="text-center mb-10">
                <i class="fab fa-github text-6xl mb-4 text-slate-800"></i>
                <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
                <p class="text-gray-400 mt-2">Sign in to manage your issues</p>
            </div>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold mb-2">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                    <p class="text-[10px] text-indigo-600 mt-1">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-2">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                    <p class="text-[10px] text-indigo-600 mt-1">Default: admin123</p>
                </div>
                <button onclick="handleLogin()" class="w-full bg-[#4F46E5] text-white py-3 rounded-lg font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">Sign In</button>
            </div>
            <div class="mt-10 pt-6 border-t text-center">
                <span class="text-xs text-gray-400 bg-white px-3 -mt-9 inline-block relative">OR</span>
                <div class="bg-slate-50 p-4 rounded-xl mt-4 border border-slate-100">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2">Demo Credentials:</p>
                    <div class="flex justify-around text-sm">
                        <span>User: <b>admin</b></span>
                        <span>Pass: <b>admin123</b></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboard" class="hidden min-h-screen">
        <nav class="bg-white border-b px-8 py-4 flex flex-col md:flex-row justify-between items-center sticky top-0 z-20 gap-4">
            <div class="flex items-center gap-3">
                <i class="fab fa-github text-3xl"></i>
                <span class="font-extrabold text-xl tracking-tight">GitHub Issues Tracker</span>
            </div>
            <div class="flex items-center gap-2 w-full md:w-auto">
                <div class="relative w-full">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="Search issues..." class="pl-10 pr-4 py-2 border rounded-lg w-full md:w-[350px] focus:outline-none focus:ring-1 focus:ring-indigo-500 text-sm">
                </div>
                <button class="bg-[#4F46E5] text-white px-5 py-2 rounded-lg font-bold text-sm whitespace-nowrap hover:bg-indigo-700">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto p-6 md:p-10">
            <div class="flex gap-3 mb-10 bg-white p-1 rounded-xl w-fit border border-slate-200">
                <button onclick="filterIssues('all')" id="tab-all" class="px-8 py-2.5 rounded-lg font-bold text-sm text-gray-500 active-tab transition-all">All</button>
                <button onclick="filterIssues('open')" id="tab-open" class="px-8 py-2.5 rounded-lg font-bold text-sm text-gray-500 transition-all">Open</button>
                <button onclick="filterIssues('closed')" id="tab-closed" class="px-8 py-2.5 rounded-lg font-bold text-sm text-gray-500 transition-all">Closed</button>
            </div>

            <div class="flex justify-between items-end mb-8 border-b border-slate-200 pb-6">
                <div class="flex items-center gap-5">
                    <div class="bg-indigo-50 p-4 rounded-2xl text-indigo-600">
                        <i class="fas fa-layer-group text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-3xl font-black text-slate-800 tracking-tight"><span id="issue-count">0</span> Issues</h2>
                        <p class="text-slate-400 font-medium">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="hidden md:flex gap-6 text-sm font-bold text-slate-500">
                    <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 bg-green-500 rounded-full"></span> Open</span>
                    <span class="flex items-center gap-2"><span class="w-2.5 h-2.5 bg-purple-500 rounded-full"></span> Closed</span>
                </div>
            </div>

            <div id="loading" class="text-center py-32 hidden">
                <div class="inline-block animate-spin rounded-full h-14 w-14 border-[5px] border-indigo-600 border-t-transparent"></div>
            </div>

            <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

    <div id="modal" class="fixed inset-0 modal-overlay hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-[24px] max-w-[600px] w-full p-10 relative shadow-2xl overflow-hidden">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 transition">
                <i class="fas fa-times text-2xl"></i>
            </button>
            <div id="modal-content">
                </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
